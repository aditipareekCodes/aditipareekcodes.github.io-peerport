<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeerPort | Sell Product</title>
    <style>
        /* Global Dark Theme */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #050505;
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Animated Background Orbs --- */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.25;
            animation: float 10s infinite alternate ease-in-out;
        }
        .orb-green { width: 400px; height: 400px; background: #00e676; top: 10%; left: -5%; }
        .orb-cyan { width: 350px; height: 350px; background: #00e5ff; bottom: 5%; right: -5%; animation-delay: -5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.1); }
        }

        /* --- Glassmorphism Navbar --- */
        .navbar {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-box h1 {
            margin: 0; font-size: 24px;
            background: linear-gradient(90deg, #00e5ff, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }
        .logo-box p { margin: 2px 0 0 0; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px;}
        
        .user-controls {
            display: flex; align-items: center; gap: 20px;
        }
        .welcome-text { font-size: 15px; color: #ccc; }
        .welcome-text strong { color: #fff; font-weight: 600; }
        
        .btn-outline {
            background: rgba(0, 229, 255, 0.1); color: #00e5ff;
            border: 1px solid rgba(0, 229, 255, 0.3); padding: 8px 16px;
            border-radius: 6px; cursor: pointer; transition: 0.3s; font-weight: bold; text-decoration: none;
            font-size: 14px;
        }
        .btn-outline:hover { background: #00e5ff; color: #000; box-shadow: 0 0 15px rgba(0, 229, 255, 0.5); }

        /* --- Form Container --- */
        .container {
            max-width: 600px; margin: 40px auto; padding: 0 20px;
        }

        .form-card {
            background: rgba(25, 25, 25, 0.6);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 230, 118, 0.2);
            border-radius: 16px; padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), 0 0 20px rgba(0, 230, 118, 0.1);
        }

        .form-card h2 {
            margin-top: 0; margin-bottom: 5px; font-size: 28px;
            color: #00e676; text-align: center;
        }
        .form-card p.subtitle {
            text-align: center; color: #888; margin-bottom: 30px; font-size: 14px;
        }

        .form-group { margin-bottom: 20px; }
        .row-2 { display: flex; gap: 20px; }
        .row-2 .form-group { flex: 1; }

        label {
            display: block; font-size: 13px; color: #b3b3b3; margin-bottom: 8px;
            letter-spacing: 0.5px; text-transform: uppercase; font-weight: 600;
        }

        input[type="text"], input[type="number"], select {
            width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.5);
            border: 1px solid #333; color: #fff; border-radius: 8px;
            box-sizing: border-box; font-size: 15px; transition: all 0.3s ease;
        }
        
        input:focus, select:focus {
            outline: none; border-color: #00e676;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.3); background: rgba(0, 0, 0, 0.8);
        }

        .checkbox-group {
            display: flex; gap: 20px; margin-bottom: 25px; margin-top: 10px;
        }
        .check-label {
            display: flex; align-items: center; gap: 8px; color: #ccc; text-transform: none; font-size: 15px; font-weight: normal;
        }

        .submit-btn {
            width: 100%; padding: 15px;
            background: linear-gradient(45deg, #00e676, #00c853);
            color: #000; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 230, 118, 0.4);
            margin-top: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 230, 118, 0.6);
        }
    </style>
</head>
<body>

    <div class="orb orb-green"></div>
    <div class="orb orb-cyan"></div>

    <nav class="navbar">
        <div class="logo-box" onclick="window.location.href='/dashboard.html'">
            <h1>PeerPort</h1>
            <p>Resale Platform For Students</p>
        </div>
        <div class="user-controls">
            <span class="welcome-text">Seller: <strong>{{ user_name }}</strong></span>
            <a href="/dashboard.html" class="btn-outline">Back to Dashboard</a>
        </div>
    </nav>

    <div class="container">
        <div class="form-card">
            <h2>List an Item</h2>
            <p class="subtitle">Upload your unused textbook or tool to the campus marketplace</p>

            <form action="/sell.html" method="POST" enctype="multipart/form-data">
                
                <div class="form-group">
                    <label>Upload Item Photo</label>
                    <input type="file" name="image" accept="image/*" required style="padding: 10px; background: rgba(0,0,0,0.5); border: 1px dashed #00e676; border-radius: 8px; cursor: pointer;">
                </div>

                <div class="form-group">
                    <label>Item Title</label>
                    <input type="text" name="title" placeholder="e.g. Automata Theory Textbook" required>
                </div>

                <div class="row-2">
                    <div class="form-group">
                        <label>Selling Price (₹)</label>
                        <input type="number" name="price" placeholder="Your price" required>
                    </div>
                    <div class="form-group">
                        <label>Original MRP (₹)</label>
                        <input type="number" name="mrp" placeholder="Optional">
                    </div>
                </div>

                <div class="form-group">
                    <label>Condition</label>
                    <select name="condition" required>
                        <option value="" disabled selected>Select condition...</option>
                        <option value="Like New">Like New (Barely used)</option>
                        <option value="Good">Good (Some highlights/marks)</option>
                        <option value="Worn">Worn (Heavily used but functional)</option>
                    </select>
                </div>

                <label>Accepted Payment Methods (Campus Meetup)</label>
                <div class="checkbox-group">
                    <label class="check-label"><input type="checkbox" checked disabled> Cash</label>
                    <label class="check-label"><input type="checkbox" checked disabled> UPI</label>
                </div>

                <button type="submit" class="submit-btn">Post Listing to Database</button>
            </form>
        </div>
    </div>

</body>
</html>
